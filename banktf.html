<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="fontawesome-free-6.2.0-web/css/all.css">
    <script src="js.js"></script>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;1,900&amp;display=swap');
        * {
            padding: 0;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .top {
           width: 100%;
           height: 39px; 
           margin-top: 30px;
           background: rgb(208, 206, 206);
        }
        .top p {
            padding-top: 6px;
            padding-left: 20px;
        }

        .amount {
            width: 100%;
            height: 120px;
            background: #ffffff;
        }
        .amount h3  {
            float: right;
            position: relative;
            bottom: -20px;
            padding-right: 12px;
        }
        .amount  p {
            float: right;
            padding-right: 12px;
        }
        .amount img {
            width: 100px;
            position: relative;
            top: -36px;
        }
      .tp  p {
            text-align: center;
        }

        /* 🔴 WARNING STYLE */
        .warning-text {
            color: red;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .box {
            width: 95%;
            height: fit-content;
            margin: 0 auto;
            border: 1px solid grey;
            background: #f5f2f2;
        }
        .box h3, p {
            padding-left: 15px;
        }

        .copy-button {
            float: right;
            margin-right: 15px;
            background-color: orange;
            color: white;
            border: none;
            cursor: pointer;
            position: relative;
            top: -20px;
            width: 50px;
        }
        .btn button {
            width: 89%;
            height: 39px;
            margin:  0 auto;
            display: block;
            border: none;
            background: orange;
        }

        #spinner, #transferCompleteMessage {
            text-align: center;
            font-size: 20px;
            display: none;
            margin-top: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid orange;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin .7s linear infinite;
            margin: 0 auto;
            margin-top: 20px;
        }

        .bc {
            width: 90%;
            height: 50px;
            margin: 0 auto;
            border: 1px solid rgb(233, 232, 232);
            background: #f2f2f2;
        }

        .bb i {
            color: green;
            float: right;
            position: relative;
            left: -20px;
            top: 12px;
        }

        .spinners {
            width: 20px;
            height: 20px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid orange;
            border-radius: 50%;
            animation: spin .2s linear infinite;
            margin: 50px auto;
            float: right;
            position: relative;
            top: -39px;
        }

        h4{
            color: orange;
        }

        .password {
            width: 300px;
            margin: 15px auto;
            position: relative;
        }
        #password-input {
            width: 100%;
            padding: 5px 0;
            height: 30px;
            text-indent: 10px;
            border-radius: 5px;
            border: 1px solid #999;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="top">
        <p>Bank Transfer <span style="float: right; padding-right: 10px; color: red;">Cancel</span></p>
    </div>

    <div class="amount">
        <h3>NGN <span>5,500</span></h3>
        <br><br>
        <p style="font-size: 11px;" id="email"></p>
        <img src="img/fl%20logo.png" alt="">
    </div>

    <!-- ✅ UPDATED SECTION -->
    <div class="tp">
        <p>Proceed to your bank app to complete this Transfer</p>
        <p class="warning-text">
            ⚠️ WARNING: DO NOT MAKE PAYMENT USING OPAY. USE ANY OTHER BANK ONLY ⚠️
        </p>
    </div>

</body>
</html>
