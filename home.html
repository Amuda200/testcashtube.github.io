<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.2/jquery.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;900&display=swap');

* {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #000;
}

#gradient {
    width: 100%;
    height: auto;
}

.top img {
    width: 80px;
    padding-left: 12px;
    padding-top: 40px;
}

.top p {
    position: relative;
    top: -56px;
    padding-left: 96px;
    font-size: 20px;
}

.money {
    width: 95%;
    height: 150px;
    margin: 0 auto;
    background: green;
    border-radius: 8px;
    color: white;
    padding-top: 10px;
}

.money p, h2 {
    padding-left: 19px;
}

.form {
    width: 95%;
    margin: 0 auto;
    border-radius: 10px;
    border: 1px solid green;
    background: #ffffff;
    padding: 15px;
}

.input-container {
    position: relative;
    margin-bottom: 20px;
}

.input-container input {
    border: none;
    border-bottom: 2px solid #000;
    outline: none;
    padding: 5px 0;
    font-size: 16px;
    width: 90%;
    margin: 0 auto;
    display: block;
}

.input-container input:focus {
    border-bottom-color: green;
}

.input-container label {
    position: absolute;
    bottom: 0;
    left: 0;
    transition: 0.2s ease all;
    font-size: 16px;
    padding-left: 17px;
}

.input-container input:focus ~ label,
.input-container input:valid ~ label {
    transform: translateY(-29px);
    font-size: 14px;
    color: green;
}

button {
    width: 40%;
    height: 40px;
    margin: 0 auto;
    display: block;
    background: green;
    font-size: 22px;
    color: white;
    border: none;
    border-radius: 6px;
}

g {
    color: red;
}

iframe {
    margin: 0 auto;
    display: block;
}
</style>
</head>

<body>

<div id="gradient"></div>

<div class="top">
    <img src="img/top.png" alt="">
    <p><b>Hello, Valid User</b></p>
    <p>Good Day.</p>
</div>

<br>

<div class="money">
    <p>Available Balance</p>
    <h2>₦ <span id="number">5500</span></h2>
</div>

<br><br>

<center>
    <h1>Watch video to earn money</h1>

    <iframe width="95%" height="315" src="video2.mp4"
        title="Watch to Earn" frameborder="0" allow="autoplay; encrypted-media;" allowfullscreen>
    </iframe>

    <br><br>
    <h4>The more videos you watch, the more your <g>available balance</g> increases</h4>
</center>

<br><br>

<div class="form">
<form id="fundForm">

<div class="input-container">
    <input type="number" id="palmpayNumber" required>
    <label>Account Number</label>
</div>

<div class="input-container">
    <input type="text" id="palmpayName" required>
    <label>Account Name</label>
</div>

<div class="input-container">
    <input type="text" id="palmpayCome" required>
    <label>Bank Name</label>
</div>

<div class="input-container">
    <input type="number" id="amount" required>
    <label>Amount</label>
</div>

<br>
<button type="submit">Withdraw</button>

</form>
</div>

<br><br><br>

<script>
const numberElement = document.getElementById('number');
let number = localStorage.getItem('number');

if (!number) {
    number = 5500;
} else {
    number = parseInt(number);
}

numberElement.textContent = number.toLocaleString();

// Fake earning system
function updateNumber() {
    number += 164;
    numberElement.textContent = number.toLocaleString();
    localStorage.setItem('number', number);
}

setInterval(updateNumber, 2000);

// ✅ UPDATED Withdraw Logic
document.getElementById('fundForm').addEventListener('submit', function (event) {
    event.preventDefault();

    const amount = parseInt(document.getElementById('amount').value);

    // ❌ Invalid amount
    if (isNaN(amount) || amount <= 0) {
        alert("Enter a valid amount.");
        return;
    }

    // ❌ Insufficient balance
    if (amount > number) {
        alert("Insufficient balance! You cannot withdraw more than your available balance.");
        return;
    }

    // ✅ Valid withdrawal
    number -= amount;

    numberElement.textContent = number.toLocaleString();
    localStorage.setItem('number', number);

    localStorage.setItem('palmpayNumber', document.getElementById('palmpayNumber').value);
    localStorage.setItem('palmpayName', document.getElementById('palmpayName').value);
    localStorage.setItem('palmpayCome', document.getElementById('palmpayCome').value);
    localStorage.setItem('amount', amount);

    alert("Withdrawal request submitted successfully!");

    window.location.href = 'next-page.html';
});
</script>

</body>
    </html>
